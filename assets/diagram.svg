<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="420" rx="12" fill="#0f0f23"/>

  <text x="400" y="48" text-anchor="middle" fill="#e2e8f0" font-size="28" font-weight="700">code2idea</text>
  <text x="400" y="74" text-anchor="middle" fill="#94a3b8" font-size="14">You bring the idea. It writes the code.</text>

  <rect x="30" y="110" width="160" height="70" rx="10" fill="none" stroke="#6366f1" stroke-width="2"/>
  <text x="110" y="140" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">YOUR IDEA</text>
  <text x="110" y="160" text-anchor="middle" fill="#94a3b8" font-size="11">"try attention gates</text>
  <text x="110" y="174" text-anchor="middle" fill="#94a3b8" font-size="11">in the decoder"</text>

  <line x1="190" y1="145" x2="245" y2="145" stroke="#6366f1" stroke-width="2"/>
  <polygon points="240,140 250,145 240,150" fill="#6366f1"/>

  <rect x="255" y="100" width="120" height="44" rx="8" fill="#1e1e3f" stroke="#334155" stroke-width="1"/>
  <text x="315" y="118" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">FIND PAPERS</text>
  <text x="315" y="133" text-anchor="middle" fill="#e2e8f0" font-size="12">arXiv + WebSearch</text>

  <rect x="255" y="152" width="120" height="44" rx="8" fill="#1e1e3f" stroke="#334155" stroke-width="1"/>
  <text x="315" y="170" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">DISCUSS</text>
  <text x="315" y="185" text-anchor="middle" fill="#e2e8f0" font-size="12">confirm with user</text>

  <line x1="375" y1="145" x2="425" y2="145" stroke="#6366f1" stroke-width="2"/>
  <polygon points="420,140 430,145 420,150" fill="#6366f1"/>

  <rect x="435" y="110" width="130" height="70" rx="10" fill="#1e1e3f" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="135" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="600">IMPLEMENT</text>
  <text x="500" y="152" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Agent edits code</text>
  <text x="500" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">surgical changes</text>

  <line x1="565" y1="145" x2="615" y2="145" stroke="#6366f1" stroke-width="2"/>
  <polygon points="610,140 620,145 610,150" fill="#6366f1"/>

  <rect x="625" y="110" width="145" height="70" rx="10" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="698" y="135" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">LAUNCH</text>
  <text x="698" y="152" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Run experiment</text>
  <text x="698" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">git commit + GPU</text>

  <line x1="50" y1="220" x2="750" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="248" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600" letter-spacing="2">PARALLEL ITERATIONS</text>

  <rect x="80" y="268" width="640" height="130" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="100" cy="284" r="5" fill="#f85149"/>
  <circle cx="116" cy="284" r="5" fill="#e3b341"/>
  <circle cx="132" cy="284" r="5" fill="#3fb950"/>
  <text x="180" y="288" fill="#484f58" font-size="11">claude</text>

  <text x="100" y="312" fill="#8b949e" font-size="12" font-family="monospace">❯</text>
  <text x="116" y="312" fill="#c9d1d9" font-size="12" font-family="monospace">/idea-iter add attention gates</text>
  <text x="500" y="312" fill="#3fb950" font-size="12" font-family="monospace">→ iter 1 launched</text>

  <text x="100" y="334" fill="#8b949e" font-size="12" font-family="monospace">❯</text>
  <text x="116" y="334" fill="#c9d1d9" font-size="12" font-family="monospace">/idea-iter increase batch size</text>
  <text x="500" y="334" fill="#3fb950" font-size="12" font-family="monospace">→ iter 2 launched</text>

  <text x="100" y="356" fill="#8b949e" font-size="12" font-family="monospace">❯</text>
  <text x="116" y="356" fill="#c9d1d9" font-size="12" font-family="monospace">/idea-iter try cosine annealing</text>
  <text x="500" y="356" fill="#3fb950" font-size="12" font-family="monospace">→ iter 3 launched</text>

  <text x="100" y="382" fill="#8b949e" font-size="12" font-family="monospace">❯</text>
  <text x="116" y="382" fill="#58a6ff" font-size="12" font-family="monospace">/check-experiments</text>
  <text x="500" y="382" fill="#e3b341" font-size="12" font-family="monospace">→ results collected</text>
</svg>
